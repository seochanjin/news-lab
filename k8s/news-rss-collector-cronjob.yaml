apiVersion: batch/v1
kind: CronJob
metadata:
  name: news-rss-collector
spec:
  schedule: "0 3 * * *"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: news-rss-collector
        spec:
          restartPolicy: Never
          nodeSelector:
            workload: app
          containers:
          - name: news-rss-collector
            image: seocj/news-api:980a237515377418fdae7fe3fb2f945c011237ce
            imagePullPolicy: Always
            command: ["python", "scripts/collect_rss.py"]
            env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: news-api-secret
                  key: DATABASE_URL
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"
