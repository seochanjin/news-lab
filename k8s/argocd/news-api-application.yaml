apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: news-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/seochanjin/news-lab.git
    targetRevision: main
    path: k8s
    directory:
      recurse: false
      exclude: cluster-issuer.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
