apiVersion: batch/v1
kind: CronJob
metadata:
  name: news-raw-extractor
spec:
  schedule: "30 3 * * *"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: news-raw-extractor
        spec:
          restartPolicy: Never
          nodeSelector:
            workload: app
          containers:
            - name: news-raw-extractor
              image: seocj/news-api:latest
              imagePullPolicy: Always
              command: ["python", "scripts/extract_raw_articles.py"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: news-api-secret
                      key: DATABASE_URL
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
