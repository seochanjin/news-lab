apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: news-api
  template:
    metadata:
      labels:
        app: news-api
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: news-api
          image: seocj/news-api:6c988f8540ae873901d6182d66eeb351b767e160
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: news-api-secret
                  key: DATABASE_URL
            - name: REDIS_URL
              value: redis://news-redis:6379/0
            - name: HOME_TOPICS_CACHE_TTL_SECONDS
              value: "108000"
            - name: THREE_DAY_HOME_TOPICS_CACHE_TTL_SECONDS
              value: "108000"
            - name: WEEKLY_HOME_TOPICS_CACHE_TTL_SECONDS
              value: "691200"
            - name: REDIS_TIMEOUT_SECONDS
              value: "0.05"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: news-api
spec:
  selector:
    app: news-api
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: news-api-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.dev-scj.site
      secretName: news-api-tls
    - hosts:
        - api.newslab.ai.kr
      secretName: news-api-newslab-tls
  rules:
    - host: api.dev-scj.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: news-api
                port:
                  number: 80
    - host: api.newslab.ai.kr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: news-api
                port:
                  number: 80
