apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: news-api
  template:
    metadata:
      labels:
        app: news-api
    spec:
      nodeSelector:
        workload: app
      containers:
      - name: news-api
        image: seocj/news-api:0.1.0
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: news-api
spec:
  selector:
    app: news-api
  ports:
  - port: 80
    targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: news-api-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - api.dev-scj.site
    secretName: news-api-tls
  rules:
  - host: api.dev-scj.site
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: news-api
            port:
              number: 80
