apiVersion: batch/v1
kind: CronJob
metadata:
  name: news-daily-topic-pipeline
spec:
  schedule: "0 4 * * *"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: news-daily-topic-pipeline
        spec:
          restartPolicy: Never
          nodeSelector:
            workload: app
          containers:
            - name: news-daily-topic-pipeline
              image: seocj/news-api:latest
              imagePullPolicy: Always
              command:
                - python
                - -u
                - scripts/run_daily_topic_pipeline.py
                - --window-hours
                - "24"
                - --max-articles
                - "300"
                - --similarity-threshold
                - "0.70"
                - --max-topics
                - "3"
                - --max-reference-topics
                - "10"
                - --max-related-articles-per-topic
                - "20"
                - --max-summary-articles-per-topic
                - "3"
                - --max-raw-chars-per-article
                - "3000"
                - --use-embedding-provider
                - --use-summary-provider
                - --summary-model
                - gpt-5-nano
                - --execute
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: news-api-secret
                      key: DATABASE_URL
                - name: OPENAI_EMBEDDING_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: news-api-secret
                      key: OPENAI_EMBEDDING_API_KEY
                - name: OPENAI_SUMMARY_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: news-api-secret
                      key: OPENAI_SUMMARY_API_KEY
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
