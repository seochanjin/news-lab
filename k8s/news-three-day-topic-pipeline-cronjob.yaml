apiVersion: batch/v1
kind: CronJob
metadata:
  name: news-three-day-topic-pipeline
spec:
  schedule: "0 5 * * *"
  timeZone: "Asia/Seoul"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: news-three-day-topic-pipeline
        spec:
          restartPolicy: Never
          nodeSelector:
            workload: app
          containers:
            - name: news-three-day-topic-pipeline
              image: seocj/news-api:6c988f8540ae873901d6182d66eeb351b767e160
              imagePullPolicy: Always
              command:
                - python
                - -u
                - scripts/run_three_day_topic_pipeline.py
                - --window-hours
                - "72"
                - --max-articles
                - "500"
                - --similarity-threshold
                - "0.70"
                - --max-topics
                - "5"
                - --max-related-articles-per-topic
                - "20"
                - --max-summary-articles-per-topic
                - "3"
                - --max-raw-chars-per-article
                - "3000"
                - --use-summary-provider
                - --summary-model
                - gpt-5-nano
                - --execute
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: news-api-secret
                      key: DATABASE_URL
                - name: OPENAI_SUMMARY_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: news-api-secret
                      key: OPENAI_SUMMARY_API_KEY
                - name: REDIS_URL
                  value: redis://news-redis:6379/0
                - name: THREE_DAY_HOME_TOPICS_CACHE_TTL_SECONDS
                  value: "108000"
                - name: REDIS_TIMEOUT_SECONDS
                  value: "0.05"
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          volumes:
            - name: tmp
              emptyDir: {}
